name: "e5.stack/api"
services:
  database:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
        - ${DB_PORT}:5432
    volumes:
      - database:/var/lib/postgresql/data

  mailtrap:
    image: rnwood/smtp4dev:latest
    ports:
      - "5001:80" # Web UI
      - ${SMTP_PORT}:25 # SMTP

volumes:
  database: